version: 2

project_name: synapta

builds:
  - id: synapta
    main: ./cmd/synapta
    binary: synapta
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/ashiqrniloy/synapta-cli/internal/version.Version={{ .Version }}
      - -X github.com/ashiqrniloy/synapta-cli/internal/version.Commit={{ .Commit }}
      - -X github.com/ashiqrniloy/synapta-cli/internal/version.Date={{ .Date }}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE

checksum:
  name_template: "checksums.txt"

release:
  prerelease: auto

changelog:
  sort: asc
  use: git

